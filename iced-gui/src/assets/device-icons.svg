<svg xmlns="http://www.w3.org/2000/svg">
  <!-- Phone icon -->
  <symbol id="phone" viewBox="0 0 24 24">
    <rect x="5" y="2" width="14" height="20" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="12" y1="18" x2="12" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <!-- Tablet icon -->
  <symbol id="tablet" viewBox="0 0 24 24">
    <rect x="4" y="2" width="16" height="20" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="12" y1="18" x2="12" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <!-- Desktop/Browser icon -->
  <symbol id="browser" viewBox="0 0 24 24">
    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <!-- Desktop icon -->
  <symbol id="desktop" viewBox="0 0 24 24">
    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <!-- IoT/CPU icon -->
  <symbol id="iot" viewBox="0 0 24 24">
    <rect x="4" y="4" width="16" height="16" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="9" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2"/>
    <line x1="15" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2"/>
    <line x1="9" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="2"/>
  </symbol>
  <!-- Other/Grid icon -->
  <symbol id="other" viewBox="0 0 24 24">
    <rect x="3" y="3" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="14" y="3" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="14" y="14" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="3" y="14" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>
</svg>